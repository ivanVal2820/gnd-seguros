services:
  web:
    build:
      context: .
      args:
        DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gnd_seguros
    container_name: gnd_seguros_web_dev
    environment:
      - PORT=3002
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET}
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID}
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET}
      - MAIL_FROM_UPN=${MAIL_FROM_UPN}
      - MAIL_OVERRIDE_TO=${MAIL_OVERRIDE_TO}
      - APP_URL=${APP_URL}
    depends_on:
      - postgres
    command: npm run dev -- --hostname 0.0.0.0 --port 3002
    ports:
      - "127.0.0.1:3002:3002"
    volumes:
      - .:/app
      - /app/node_modules
      - ./storage:/app/storage
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gnd_seguros
    container_name: gnd_seguros_worker_dev
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET}
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID}
      - GRAPH_TENANT_ID=${GRAPH_TENANT_ID}
      - GRAPH_CLIENT_ID=${GRAPH_CLIENT_ID}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET}
      - MAIL_FROM_UPN=${MAIL_FROM_UPN}
      - MAIL_OVERRIDE_TO=${MAIL_OVERRIDE_TO}
      - APP_URL=${APP_URL}
    depends_on:
      - postgres
    command: npm run worker:scheduler
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: gnd_seguros_db
    environment:
      POSTGRES_DB: gnd_seguros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - gnd_seguros_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  gnd_seguros_pgdata: